replicaCount: 2

image:
  repository: ghcr.io/ehsanking/elahemessenger
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

ingress:
  enabled: false
  className: nginx
  host: elahe.example.com
  tls:
    enabled: true
    secretName: elahe-tls
  certManagerIssuer: letsencrypt-prod

env:
  NODE_ENV: production
  LOG_FORMAT: json
  LOG_DESTINATIONS: stdout

database:
  external: false
  host: ""
  port: 5432
  name: elahe
  user: elahe
  password: change-me
  storage: 10Gi

redis:
  enabled: true
  image: redis:7-alpine
  storage: 2Gi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

secrets:
  sessionSecret: change-me-please-at-least-32-characters
  backupEncryptionKey: ""
