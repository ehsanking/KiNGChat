name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: elahe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elahe_test
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci --no-fund --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --project unit

      - name: Integration tests
        run: npm run test -- --project integration

      - name: Build
        run: npm run build

      - name: Docker compose config validation
        env:
          JWT_SECRET: ci-jwt-secret
          SESSION_SECRET: ci-session-secret
          ENCRYPTION_KEY: ci-encryption-key
          DOWNLOAD_TOKEN_SECRET: ci-download-token-secret
          ADMIN_USERNAME: ci-admin
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elahe_test
          APP_DB_USER: elahe_app
          APP_DB_PASSWORD: elahe_app_password
        run: docker compose config >/dev/null

      - name: Docker build validation
        run: docker build -t elahe-messenger-ci .

      - name: Shell script lint
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck install.sh docker-entrypoint.sh

      - name: Deployment and installer smoke checks
        run: npm run test -- tests/deployment-topology-regressions.test.ts tests/install-script-guardrails.test.ts

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
