<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <defs>
    <style>
      .cls-1 { fill: #002d58; }
      .cls-2 { fill: #b8860b; }
      .cls-3 { fill: #ffffff; }
    </style>
  </defs>
  
  <!-- Gold Bubble (Right) -->
  <path class="cls-2" d="M600,330 C750,330 870,430 870,550 C870,670 750,770 600,770 C570,770 540,766 510,758 C460,810 380,840 300,840 C290,840 280,839 270,838 C350,760 400,660 400,550 C400,440 350,340 270,262 C330,240 400,230 470,230 C520,230 560,235 600,245 Z" />
  
  <!-- Blue Bubble (Left) -->
  <path class="cls-1" d="M400,230 C220,230 80,350 80,500 C80,580 120,650 180,700 L150,820 L280,760 C320,775 360,780 400,780 C580,780 720,660 720,500 C720,340 580,230 400,230 Z" />
  
  <!-- Crown Base Bar -->
